<style>
  :root {
    --black: #111;
    --white: #fff;
    --gray-50: #fafafa;
    --gray-100: #f5f5f5;
    --gray-400: #a1a1a1;
    --gray-500: #737373;
    --gray-600: #525252;
    --blue: #007AFF;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --black: #f5f5f5;
      --white: #111;
      --gray-50: #1a1a1a;
      --gray-100: #1c1c1c;
      --gray-400: #666;
      --gray-500: #999;
      --gray-600: #aaa;
    }
  }

  @media (prefers-color-scheme: dark) {
    .hero::before { display: none; }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    color: var(--black);
    background: var(--white);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HERO ── */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 24px 80px;
    min-height: 100vh;
    position: relative;
    overflow: hidden;
  }

  /* Subtle background texture */
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 40%, var(--gray-100) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    max-width: 520px;
  }

  /* ── WORDMARK ── */
  .wordmark {
    display: inline-flex;
    align-items: center;
    gap: 0;
    opacity: 0;
    animation: fadeUp 0.8s ease-out 0.1s forwards;
  }

  .ships {
    display: flex;
    align-items: center;
    gap: 3px;
    margin-right: 8px;
  }

  .ship {
    width: 11px;
    height: 28px;
    background: var(--black);
    border-radius: 6px;
  }

  .ship-up { transform: translateY(-5px); }
  .ship-down { transform: translateY(5px); }

  .wordmark-text {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -1.5px;
    color: var(--black);
    line-height: 1;
  }

  /* ── TAGLINE ── */
  .tagline {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.35;
    text-align: center;
    color: var(--black);
    margin-top: 32px;
    letter-spacing: -0.3px;
    opacity: 0;
    animation: fadeUp 0.8s ease-out 0.3s forwards;
  }

  .description {
    font-size: 17px;
    font-weight: 400;
    line-height: 1.6;
    text-align: center;
    color: var(--gray-600);
    margin-top: 20px;
    max-width: 420px;
    opacity: 0;
    animation: fadeUp 0.8s ease-out 0.45s forwards;
  }

  /* ── CTA ── */
  .cta-group {
    margin-top: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    opacity: 0;
    animation: fadeUp 0.8s ease-out 0.6s forwards;
  }

  .app-store-badge {
    display: inline-block;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }

  .app-store-badge:hover {
    transform: scale(0.97);
    opacity: 0.85;
  }

  .app-store-badge:active {
    transform: scale(0.95);
  }

  .app-store-badge img {
    display: block;
  }

  /* ── FOOTER ── */
  footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 16px 24px;
    text-align: center;
    background: linear-gradient(to top, var(--white) 60%, transparent);
    z-index: 10;
  }

  footer nav {
    display: flex;
    justify-content: center;
    gap: 24px;
    flex-wrap: wrap;
  }

  footer a {
    font-size: 13px;
    color: var(--gray-500);
    text-decoration: none;
    transition: color 0.15s ease;
  }

  footer a:hover {
    color: var(--black);
  }

  .footer-divider {
    color: var(--gray-400);
    font-size: 13px;
    user-select: none;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from {
      opacity: 0;
      transform: translateY(16px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    .hero { padding: 60px 20px 40px; }
    .wordmark-text { font-size: 34px; }
    .ship { width: 9px; height: 24px; }
    .ships { gap: 2px; margin-right: 6px; }
    .tagline { font-size: 19px; margin-top: 28px; }
    .description { font-size: 16px; }
  }
</style>
</head>
<body>

<section class="hero">
  <div class="hero-content">

    <!-- Wordmark -->
    <div class="wordmark">
      <div class="ships">
        <div class="ship ship-up"></div>

      <span class="wordmark-text">Two Ships</span>
    </div>

    <!-- Tagline -->
    <h1 class="tagline">Discover the moments you've shared before you ever met!</h1>

    <!-- Description -->
    <p class="description">
      Find out if you and a friend have ever been in the same place at the same time.

    <!-- CTA -->

      </a>
    </div>

  </div>
</section>
