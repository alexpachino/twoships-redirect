<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Two Ships — You've been invited!</title>
<meta name="description" content="Someone wants to connect with you on Two Ships. Discover the moments you've shared before you ever met!">
<meta property="og:title" content="Two Ships — You've been invited!">
<meta property="og:description" content="Discover the moments you've shared before you ever met!">
<meta property="og:type" content="website">
<meta property="og:url" content="https://twoships.app">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,800&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #111;
    --white: #fff;
    --gray-400: #a1a1a1;
    --gray-500: #737373;
    --gray-600: #525252;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --black: #f5f5f5;
      --white: #111;
      --gray-400: #666;
      --gray-500: #999;
      --gray-600: #aaa;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html {
    font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    color: var(--black);
    background: var(--white);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px 60px;
  }
  .content {
    display: flex;
    flex-direction: column;
    align-items: center;
    max-width: 380px;
    width: 100%;
    opacity: 0;
    animation: fadeUp 0.6s ease-out 0.1s forwards;
  }
  .wordmark {
    display: inline-flex;
    align-items: center;
    text-decoration: none;
    color: var(--black);
    margin-bottom: 48px;
  }
  .ships { display: flex; align-items: center; gap: 3px; margin-right: 8px; }
  .ship { width: 13px; height: 32px; background: var(--black); border-radius: 7px; }
  .ship-up { transform: translateY(-6px); }
  .ship-down { transform: translateY(6px); }
  .wordmark-text { font-size: 42px; font-weight: 800; letter-spacing: -1.5px; }
  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(0, 122, 255, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
  }
  .avatar span {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
  }
  .invite-title {
    font-size: 20px;
    font-weight: 700;
    text-align: center;
    letter-spacing: -0.3px;
    line-height: 1.3;
  }
  .invite-title strong { font-weight: 800; }
  .buttons {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
    margin-top: 36px;
  }
  .btn-primary {
    display: inline-block;
    padding: 16px 40px;
    background: var(--black);
    color: var(--white);
    border: none;
    border-radius: 12px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;
    text-align: center;
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }
  .btn-primary:hover { transform: scale(0.98); opacity: 0.85; }
  .btn-primary:active { transform: scale(0.96); }
  .btn-secondary {
    font-family: inherit;
    font-size: 14px;
    color: var(--gray-500);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: none;
    transition: color 0.15s ease;
  }
  .btn-secondary:hover { color: var(--black); }
  footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 16px 24px;
    text-align: center;
  }
  footer nav { display: flex; justify-content: center; gap: 24px; flex-wrap: wrap; }
  footer a { font-size: 13px; color: var(--gray-500); text-decoration: none; }
  footer a:hover { color: var(--black); }
  .footer-divider { color: var(--gray-400); font-size: 13px; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @media (max-width: 480px) {
    body { padding: 40px 20px 60px; }
  }
</style>
</head>
<body>

<div class="content">
  <a href="/" class="wordmark">
    <div class="ships">
      <div class="ship ship-up"></div>
      <div class="ship ship-down"></div>
    </div>
    <span class="wordmark-text">Two Ships</span>
  </a>

  <div class="avatar">
    <span id="avatar-initials">?</span>
  </div>
  <h1 class="invite-title">
    <strong id="inviter-name">Someone</strong> wants to connect with you!
  </h1>

  <div class="buttons">
    <a href="#" id="open-btn" class="btn-primary">Open in Two Ships</a>
    <a href="#" id="download-btn" class="btn-secondary">Don't have the app? Download it here</a>
  </div>
</div>

<footer>
  <nav>
    <a href="/privacy">Privacy Policy</a>
    <span class="footer-divider">&middot;</span>
    <a href="/terms">Terms of Service</a>
    <span class="footer-divider">&middot;</span>
    <a id="contact-link" href="#">Contact</a>
  </nav>
</footer>

<script>
  (function() {
    // Build contact link in JS to avoid Cloudflare email obfuscation
    var u = 'alexpachino';
    var d = 'me.com';
    var contactEl = document.getElementById('contact-link');
    if (contactEl) contactEl.href = 'mai' + 'lto:' + u + '@' + d;

    // Parse URL params
    var params = new URLSearchParams(window.location.search);
    var shareId = params.get('id');
    var rawName = params.get('name');
    var displayName = rawName ? decodeURIComponent(rawName) : 'Someone';

    // Update name
    var nameEl = document.getElementById('inviter-name');
    if (nameEl) nameEl.textContent = displayName;

    // Update page title
    document.title = displayName + ' wants to connect \u2014 Two Ships';

    // Initials
    var parts = displayName.split(' ');
    var ini = parts.length >= 2
      ? (parts[0].charAt(0) + parts[1].charAt(0)).toUpperCase()
      : displayName.charAt(0).toUpperCase();
    var avatarEl = document.getElementById('avatar-initials');
    if (avatarEl) avatarEl.textContent = ini;

    // Deep link
    var deepLink = shareId ? 'twoships://invite?id=' + shareId : null;
    var appStoreLink = null; // Replace with real App Store URL when available

    // Open in Two Ships button
    var openBtn = document.getElementById('open-btn');
    if (openBtn) {
      openBtn.addEventListener('click', function(e) {
        e.preventDefault();
        if (!deepLink) return;
        window.location.href = deepLink;
        if (appStoreLink) {
          setTimeout(function() {
            window.location.href = appStoreLink;
          }, 1500);
        }
      });
    }

    // Download button
    var dlBtn = document.getElementById('download-btn');
    if (dlBtn && appStoreLink) {
      dlBtn.href = appStoreLink;
    }
  })();
</script>

</body>
</html>
